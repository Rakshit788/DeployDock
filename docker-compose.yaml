version : "3.9" 


services:
  postgres:
    image: postgres:latest
    container_name: vercel_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vercel_clone
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:latest
    container_name: vercel_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  nginx:
    image: nginx:latest
    container_name: vercel_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
  
  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    container_name: vercel_api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    container_name: vercel_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  deployment:
    build:
      context: ..
      dockerfile: infra/docker/deployment.Dockerfile
    container_name: vercel_deployment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
volumes:
  postgres_data:

networks:
  vercel_network:
    driver: bridge
  
